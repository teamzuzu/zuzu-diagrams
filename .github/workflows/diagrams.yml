name: Generate Diagrams & Publish to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "diagrams/**"
      - "scripts/**"
      - ".github/workflows/diagrams.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs if a new one starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    name: Generate diagram images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate diagrams
        run: |
          mkdir -p _site
          # Run every Python file in the diagrams/ directory.
          # Diagrams outputs images to the working directory (repo root).
          for f in diagrams/*.py; do
            echo "Generating $f …"
            python "$f"
          done
          # Move generated images into _site
          find . -maxdepth 1 \( -name "*.png" -o -name "*.svg" \) -exec mv {} _site/ \;

      - name: Generate index page
        run: python scripts/generate_index.py _site _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
